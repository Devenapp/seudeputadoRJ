name: Atualizar dados dos deputados

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install requests urllib3

      - name: Executar ETL em Python
        run: python ingestao.py

      - name: Salvar o arquivo atualizado no repositório
        run: |
          git config user.name "robo-fiscaliza-rj"
          git config user.email "actions@github.com"
          git add data/deputados.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Atualizar dados dos deputados"
          git pull --rebase
          git push

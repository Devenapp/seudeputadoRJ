name: Atualizar dados dos deputados

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Buscar dados na API da Câmara
        run: |
          mkdir -p data
          curl -s "https://dadosabertos.camara.leg.br/api/v2/deputados?siglaUf=RJ&itens=100&ordem=ASC&ordenarPor=nome" > bruto.json
          echo "{\"atualizadoEm\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"dados\": $(jq '.dados' bruto.json)}" > data/deputados.json
          rm bruto.json

      - name: Salvar o arquivo atualizado no repositório
        run: |
          git config user.name "robo-fiscaliza-rj"
          git config user.email "actions@github.com"
          git add data/deputados.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Atualizar dados dos deputados"
          git push
